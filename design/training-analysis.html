<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Think. – Training: Analysis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --green-900: #0D3B1E; --green-800: #14532D; --green-700: #166534;
    --green-600: #16A34A; --green-500: #22C55E; --green-400: #4ADE80;
    --green-100: #DCFCE7; --green-50: #F0FDF4;
    --sand-50: #FAFAF8; --sand-100: #F5F5F0; --sand-200: #E8E8E0;
    --sand-300: #D4D4C8; --sand-500: #8A8A7A; --sand-700: #5C5C4F; --sand-900: #2C2C24;
    --white: #FFFFFF;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Inter','Plus Jakarta Sans',-apple-system,sans-serif; background:#E8E8E0;
    display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px; }
  .phone { width:390px; height:844px; background:var(--sand-50); border-radius:44px; overflow:hidden; position:relative;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.04), 0 25px 50px -12px rgba(0,0,0,0.15); }
  .screen { width:100%; height:100%; overflow-y:auto; overflow-x:hidden; padding-bottom:110px; }
  .screen::-webkit-scrollbar { display:none; }

  .top-bar { display:flex; justify-content:space-between; align-items:center; padding:14px 24px 10px; }
  .back-btn { font-size:14px; font-weight:600; color:var(--sand-500); cursor:pointer; display:flex; align-items:center; gap:4px; }
  .back-btn svg { width:16px; height:16px; stroke:var(--sand-500); fill:none; stroke-width:2; }
  .step-counter { font-size:12px; font-weight:700; color:var(--sand-300); letter-spacing:0.5px; }

  .progress-track { height:3px; background:var(--sand-200); margin:0 24px; border-radius:2px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--green-800); border-radius:2px; }

  .content { padding:32px 24px 0; }

  .q-tag { font-size:11px; font-weight:800; letter-spacing:1.5px; color:var(--green-800); text-transform:uppercase; margin-bottom:6px; }
  .q-title { font-size:24px; font-weight:900; color:var(--sand-900); letter-spacing:-0.8px; margin-bottom:6px; }
  .q-hint { font-size:13px; font-weight:500; color:var(--sand-500); margin-bottom:24px; }

  /* Chips */
  .chips { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:32px; }
  .chip {
    padding:10px 18px; border-radius:24px; font-size:14px; font-weight:600;
    cursor:pointer; transition:all 0.2s ease; border:1.5px solid var(--sand-200);
    background:var(--white); color:var(--sand-700);
  }
  .chip:hover { border-color:var(--green-400); background:var(--green-50); }
  .chip.selected {
    background:var(--green-800); color:white; border-color:var(--green-800);
    box-shadow: 0 2px 8px rgba(13,59,30,0.25);
  }

  /* Divider */
  .divider { height:1px; background:var(--sand-200); margin:0 0 32px; }

  /* Second question */
  .q-section { margin-bottom:32px; }

  .footer { position:absolute; bottom:0; left:0; right:0; padding:16px 24px 36px; background:linear-gradient(transparent, var(--sand-50) 20%); }
  .cta-btn { width:100%; height:52px; border:none; border-radius:14px; background:var(--green-800); color:white;
    font-family:'Inter',sans-serif; font-size:15px; font-weight:700; cursor:pointer;
    box-shadow: 0 4px 12px rgba(13,59,30,0.25); }
  .cta-btn:disabled { background:var(--sand-300); box-shadow:none; cursor:default; }

  .fade-up { animation: fade-up 0.6s cubic-bezier(0.16,1,0.3,1) both; }
  .d1{animation-delay:.05s} .d2{animation-delay:.1s} .d3{animation-delay:.18s} .d4{animation-delay:.25s}
  @keyframes fade-up { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div class="phone">
  <div class="screen">
    <div class="top-bar fade-up d1">
      <div class="back-btn"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>뒤로</div>
      <div class="step-counter">2 / 4</div>
    </div>
    <div class="progress-track fade-up d1"><div class="progress-fill" style="width:50%"></div></div>

    <div class="content">
      <div class="q-section fade-up d2">
        <div class="q-tag">Q1</div>
        <div class="q-title">이 문제는 어떤 유형인가?</div>
        <div class="q-hint">해당하는 개념을 모두 선택하세요</div>
        <div class="chips">
          <div class="chip">배열</div>
          <div class="chip selected">해시맵</div>
          <div class="chip">스택</div>
          <div class="chip">큐</div>
          <div class="chip">그래프</div>
          <div class="chip">DP</div>
          <div class="chip">그리디</div>
          <div class="chip">정렬</div>
          <div class="chip">투포인터</div>
          <div class="chip">이진탐색</div>
          <div class="chip">트리</div>
          <div class="chip">DFS/BFS</div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="q-section fade-up d3">
        <div class="q-tag">Q2</div>
        <div class="q-title">핵심 관찰은 무엇인가?</div>
        <div class="q-hint">문제에서 발견한 중요한 단서를 적어주세요</div>
        <textarea style="width:100%; height:100px; border:1.5px solid var(--sand-200); border-radius:14px; padding:14px 16px;
          font-family:Inter,sans-serif; font-size:14px; color:var(--sand-900); background:var(--white); resize:none; outline:none;
          transition:border-color 0.2s;" placeholder="예: 정확히 하나의 해가 존재하므로 중복 처리 불필요"
          onfocus="this.style.borderColor='#166534'" onblur="this.style.borderColor='#E8E8E0'"></textarea>
      </div>
    </div>
  </div>
  <div class="footer">
    <button class="cta-btn">풀이 흐름 작성하기 →</button>
  </div>
</div>
</body>
</html>
