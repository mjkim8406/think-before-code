<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Think. – Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --green-900:#0D3B1E;--green-800:#14532D;--green-700:#166534;
    --green-600:#16A34A;--green-500:#22C55E;--green-400:#4ADE80;
    --green-100:#DCFCE7;--green-50:#F0FDF4;
    --sand-50:#FAFAF8;--sand-100:#F5F5F0;--sand-200:#E8E8E0;
    --sand-300:#D4D4C8;--sand-500:#8A8A7A;--sand-700:#5C5C4F;--sand-900:#2C2C24;
    --white:#FFFFFF;
    --amber-50:#FFFBEB;--amber-100:#FEF3C7;--amber-500:#F59E0B;--amber-700:#B45309;
    --red-50:#FEF2F2;--red-100:#FEE2E2;--red-500:#EF4444;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:'Inter',-apple-system,sans-serif;background:#E8E8E0;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
  .phone{width:390px;height:844px;background:var(--sand-50);border-radius:44px;overflow:hidden;position:relative;
    box-shadow:0 0 0 1px rgba(0,0,0,.04),0 25px 50px -12px rgba(0,0,0,.15)}
  .screen{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;padding-bottom:64px}
  .screen::-webkit-scrollbar{display:none}

  /* Status */
  .status-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 28px 0;font-size:13px;font-weight:600;color:var(--sand-900)}
  .status-icons{display:flex;gap:6px;align-items:center}
  .status-icons svg{width:16px;height:16px}

  /* Header */
  .page-header{padding:12px 24px 20px}
  .page-title{font-size:32px;font-weight:900;color:var(--sand-900);letter-spacing:-1.2px;margin-bottom:4px}
  .page-sub{font-size:13px;font-weight:500;color:var(--sand-500)}

  /* Filter tabs */
  .filter-bar{display:flex;gap:8px;padding:0 24px;margin-bottom:20px;overflow-x:auto}
  .filter-bar::-webkit-scrollbar{display:none}
  .filter-tab{padding:7px 16px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;
    border:1.5px solid var(--sand-200);background:var(--white);color:var(--sand-500);transition:all .2s}
  .filter-tab.active{background:var(--green-800);color:white;border-color:var(--green-800);box-shadow:0 2px 6px rgba(13,59,30,.2)}

  /* Review List */
  .review-list{padding:0 24px}

  .review-item{background:var(--white);border-radius:16px;padding:18px 20px;margin-bottom:12px;
    box-shadow:0 1px 3px rgba(0,0,0,.03),0 4px 12px rgba(0,0,0,.03);border:1px solid rgba(0,0,0,.03);
    cursor:pointer;transition:all .2s}
  .review-item:hover{transform:translateY(-1px);box-shadow:0 2px 6px rgba(0,0,0,.06),0 8px 20px rgba(0,0,0,.05)}

  .item-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .item-platform{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--green-800);
    background:var(--green-50);padding:3px 8px;border-radius:5px}
  .item-date{font-size:11px;font-weight:500;color:var(--sand-300)}

  .item-title{font-size:17px;font-weight:800;color:var(--sand-900);letter-spacing:-.3px;margin-bottom:3px}
  .item-title-en{font-size:12px;font-weight:500;color:var(--sand-500);margin-bottom:12px}

  .item-bottom{display:flex;align-items:center;justify-content:space-between}
  .item-tags{display:flex;gap:6px}
  .item-tag{font-size:11px;font-weight:600;padding:3px 10px;border-radius:6px;background:var(--sand-100);color:var(--sand-500)}

  .item-result{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:8px}
  .item-result.pass{background:var(--green-50);color:var(--green-800)}
  .item-result.partial{background:var(--amber-50);color:var(--amber-700)}
  .item-result.fail{background:var(--red-50);color:var(--red-500)}
  .result-dot{width:6px;height:6px;border-radius:50%}
  .pass .result-dot{background:var(--green-500)}
  .partial .result-dot{background:var(--amber-500)}
  .fail .result-dot{background:var(--red-500)}

  /* Tab Bar */
  .tab-bar{position:absolute;bottom:0;left:0;right:0;height:56px;
    background:rgba(250,250,248,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-top:1px solid rgba(0,0,0,.05);display:flex;align-items:center;justify-content:space-around;padding:0 28px}
  .tab-item{display:flex;flex-direction:column;align-items:center;gap:1px;cursor:pointer;padding:2px 8px;position:relative}
  .tab-item svg{width:18px;height:18px;stroke:var(--sand-300);fill:none;stroke-width:1.8}
  .tab-item span{font-size:8px;font-weight:600;color:var(--sand-300);letter-spacing:.5px;text-transform:uppercase}
  .tab-item.active svg{stroke:var(--green-800)}
  .tab-item.active span{color:var(--green-800)}
  .tab-item.active::before{content:'';position:absolute;top:-1px;width:16px;height:2px;background:var(--green-800);border-radius:0 0 2px 2px}

  .fade-up{animation:fade-up .6s cubic-bezier(.16,1,.3,1) both}
  .d1{animation-delay:.03s}.d2{animation-delay:.06s}.d3{animation-delay:.09s}.d4{animation-delay:.12s}
  .d5{animation-delay:.15s}.d6{animation-delay:.18s}.d7{animation-delay:.21s}
  @keyframes fade-up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="phone">
  <div class="screen">
    <div class="status-bar fade-up d1">
      <span>9:41</span>
      <div class="status-icons">
        <svg viewBox="0 0 16 16"><path d="M1 11h2v4H1zM5 8h2v7H5zM9 5h2v10H9zM13 2h2v13h-2z" fill="currentColor"/></svg>
        <svg viewBox="0 0 16 16"><path d="M8 2C4.7 2 2 4.1 2 6.8c0 1.3.6 2.4 1.6 3.3L8 14l4.4-3.9c1-0.9 1.6-2 1.6-3.3C14 4.1 11.3 2 8 2z" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
        <svg viewBox="0 0 20 12"><rect x="0" y="1" width="16" height="10" rx="2" fill="none" stroke="currentColor" stroke-width="1.2"/><rect x="2" y="3" width="10" height="6" rx="1" fill="currentColor"/><rect x="17" y="4" width="2" height="4" rx=".5" fill="currentColor"/></svg>
      </div>
    </div>

    <div class="page-header fade-up d1">
      <div class="page-title">Review</div>
      <div class="page-sub">총 7문제 · 적중률 71%</div>
    </div>

    <div class="filter-bar fade-up d2">
      <div class="filter-tab active">전체</div>
      <div class="filter-tab">적중</div>
      <div class="filter-tab">불일치</div>
      <div class="filter-tab">LeetCode</div>
      <div class="filter-tab">BOJ</div>
    </div>

    <div class="review-list">
      <div class="review-item fade-up d3">
        <div class="item-top">
          <span class="item-platform">LeetCode</span>
          <span class="item-date">오늘</span>
        </div>
        <div class="item-title">두 수의 합</div>
        <div class="item-title-en">Two Sum</div>
        <div class="item-bottom">
          <div class="item-tags"><span class="item-tag">해시맵</span><span class="item-tag">배열</span></div>
          <div class="item-result pass"><span class="result-dot"></span>적중</div>
        </div>
      </div>

      <div class="review-item fade-up d4">
        <div class="item-top">
          <span class="item-platform">BOJ</span>
          <span class="item-date">어제</span>
        </div>
        <div class="item-title">스택 수열</div>
        <div class="item-title-en">BOJ 1874</div>
        <div class="item-bottom">
          <div class="item-tags"><span class="item-tag">스택</span></div>
          <div class="item-result pass"><span class="result-dot"></span>적중</div>
        </div>
      </div>

      <div class="review-item fade-up d5">
        <div class="item-top">
          <span class="item-platform">LeetCode</span>
          <span class="item-date">2일 전</span>
        </div>
        <div class="item-title">유효한 괄호</div>
        <div class="item-title-en">Valid Parentheses</div>
        <div class="item-bottom">
          <div class="item-tags"><span class="item-tag">스택</span></div>
          <div class="item-result partial"><span class="result-dot"></span>부분</div>
        </div>
      </div>

      <div class="review-item fade-up d6">
        <div class="item-top">
          <span class="item-platform">BOJ</span>
          <span class="item-date">3일 전</span>
        </div>
        <div class="item-title">1로 만들기</div>
        <div class="item-title-en">BOJ 1463</div>
        <div class="item-bottom">
          <div class="item-tags"><span class="item-tag">DP</span></div>
          <div class="item-result fail"><span class="result-dot"></span>불일치</div>
        </div>
      </div>

      <div class="review-item fade-up d7">
        <div class="item-top">
          <span class="item-platform">BOJ</span>
          <span class="item-date">4일 전</span>
        </div>
        <div class="item-title">회의실 배정</div>
        <div class="item-title-en">BOJ 1931</div>
        <div class="item-bottom">
          <div class="item-tags"><span class="item-tag">그리디</span><span class="item-tag">정렬</span></div>
          <div class="item-result pass"><span class="result-dot"></span>적중</div>
        </div>
      </div>
    </div>
  </div>

  <div class="tab-bar">
    <div class="tab-item">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </div>
    <div class="tab-item active">
      <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
      <span>Review</span>
    </div>
    <div class="tab-item">
      <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>Stats</span>
    </div>
    <div class="tab-item">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      <span>Settings</span>
    </div>
  </div>
</div>
</body>
</html>
